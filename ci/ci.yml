name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check muselm/ tests/

      - name: Test
        run: pytest -q

  smoke-train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - name: End-to-end smoke run
        run: |
          head -c 200000 <(yes "the quick brown fox jumps over the lazy dog. hello world.") > corpus.txt
          muselm tokenizer-train --input corpus.txt --output data/smoke/tok.json --vocab-size 512
          muselm prepare --input corpus.txt --tokenizer data/smoke/tok.json --output data/smoke
          python - <<'PY'
          from muselm.config import TrainConfig, MuseLMConfig
          from muselm.train import train
          cfg = TrainConfig(data_dir="data/smoke", max_steps=20, eval_interval=10,
                            eval_steps=2, warmup_steps=3, batch_size=8, device="cpu",
                            checkpoint_dir="checkpoints/smoke",
                            model=MuseLMConfig(vocab_size=512, dim=64, n_layers=2,
                                               n_heads=4, n_kv_heads=2, max_seq_len=32,
                                               ffn_hidden_dim=128))
          train(cfg)
          PY
          muselm generate --checkpoint checkpoints/smoke/best.pt --tokenizer data/smoke/tok.json --prompt "the" --max-new-tokens 20
